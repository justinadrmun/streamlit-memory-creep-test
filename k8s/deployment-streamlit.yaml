apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-mem-test-streamlit
  labels:
    app: streamlit-mem-test
    test: streamlit-interactive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit-mem-test
      test: streamlit-interactive
  template:
    metadata:
      labels:
        app: streamlit-mem-test
        test: streamlit-interactive
    spec:
      containers:
        - name: app
          image: streamlit-mem-test:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          env:
            - name: MALLOC_CONF
              value: ""
            - name: ARROW_DEFAULT_MEMORY_POOL
              value: "system"
          command: ["python3"]
          args:
            - "-m"
            - "streamlit"
            - "run"
            - "app/main.py"
            - "--server.headless=true"
            - "--server.enableCORS=false"
            - "--server.enableXsrfProtection=false"
            - "--server.port=8501"
            - "--server.address=0.0.0.0"
          resources:
            requests:
              memory: "400Mi"
            limits:
              memory: "1200Mi"
          volumeMounts:
            - name: results
              mountPath: /app/results
          livenessProbe:
            exec:
              command:
                - python3
                - "-c"
                - |
                  rss = int(open('/proc/self/status').read().split('VmRSS:')[1].split()[0])
                  exit(0 if rss < 700000 else 1)
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: results
          emptyDir: {}
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-mem-test-streamlit
spec:
  type: LoadBalancer
  selector:
    app: streamlit-mem-test
    test: streamlit-interactive
  ports:
    - port: 80
      targetPort: 8501
