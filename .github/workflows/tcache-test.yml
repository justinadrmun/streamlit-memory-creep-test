name: Tcache Test

on:
  push:
    branches: [tcache-test]
  workflow_dispatch:

jobs:
  tcache-false:
    runs-on: ubuntu-latest
    name: "tcache:false (current)"
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t mem-test .
      - run: |
          mkdir -p results/false
          docker run --rm --memory 1200m --memory-swap 1200m -v $PWD/results/false:/app/results \
            -e LD_PRELOAD=/usr/lib/libjemalloc.so.2 \
            -e PYTHONMALLOC=malloc \
            -e MALLOC_CONF="narenas:1,tcache:false,dirty_decay_ms:10000,muzzy_decay_ms:10000,background_thread:true,retain:false" \
            -e MALLOC_ARENA_MAX=2 -e ARROW_DEFAULT_MEMORY_POOL=jemalloc -e JE_ARROW_MALLOC_CONF=oversize_threshold:8388608 \
            -e MIMALLOC_PURGE_DELAY=0 -e MIMALLOC_PAGE_RESET=1 \
            -e TEST_TTL=30 -e TEST_MAX_ENTRIES=6 -e TEST_NUM_PARAMS=4 -e TEST_CYCLES=4 -e TEST_DATA_MB=25 \
            -e TEST_USE_PYARROW=1 \
            mem-test python3 scripts/test_headless.py 2>&1 | tee results/false/output.txt
      - uses: actions/upload-artifact@v4
        with: { name: tcache-false, path: results/false/ }

  tcache-true:
    runs-on: ubuntu-latest
    name: "tcache:true (default)"
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t mem-test .
      - run: |
          mkdir -p results/true
          docker run --rm --memory 1200m --memory-swap 1200m -v $PWD/results/true:/app/results \
            -e LD_PRELOAD=/usr/lib/libjemalloc.so.2 \
            -e PYTHONMALLOC=malloc \
            -e MALLOC_CONF="narenas:1,dirty_decay_ms:10000,muzzy_decay_ms:10000,background_thread:true,retain:false" \
            -e MALLOC_ARENA_MAX=2 -e ARROW_DEFAULT_MEMORY_POOL=jemalloc -e JE_ARROW_MALLOC_CONF=oversize_threshold:8388608 \
            -e MIMALLOC_PURGE_DELAY=0 -e MIMALLOC_PAGE_RESET=1 \
            -e TEST_TTL=30 -e TEST_MAX_ENTRIES=6 -e TEST_NUM_PARAMS=4 -e TEST_CYCLES=4 -e TEST_DATA_MB=25 \
            -e TEST_USE_PYARROW=1 \
            mem-test python3 scripts/test_headless.py 2>&1 | tee results/true/output.txt
      - uses: actions/upload-artifact@v4
        with: { name: tcache-true, path: results/true/ }

  summary:
    needs: [tcache-false, tcache-true]
    runs-on: ubuntu-latest
    name: "Compare"
    steps:
      - uses: actions/download-artifact@v4
        with: { name: tcache-false, path: false }
      - uses: actions/download-artifact@v4
        with: { name: tcache-true, path: true }
      - run: |
          echo "tcache:false $(grep 'Final drift' false/output.txt || echo 'N/A')"
          echo "tcache:true  $(grep 'Final drift' true/output.txt || echo 'N/A')"
