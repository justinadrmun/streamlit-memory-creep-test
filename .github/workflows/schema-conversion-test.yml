name: Schema-Driven Conversion Test

on:
  push:
    branches: [schema-conversion-test]
  workflow_dispatch:

jobs:
  schema-test:
    runs-on: ubuntu-latest
    name: "Schema-driven conversion comparison"
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mem-test .

      - name: Run schema-driven test
        run: |
          mkdir -p results
          docker run --rm \
            --memory 1200m --memory-swap 1200m \
            -v $PWD/results:/app/results \
            -e PYTHONMALLOC=malloc \
            -e MALLOC_CONF="narenas:1,tcache:false,dirty_decay_ms:1000,muzzy_decay_ms:1000,background_thread:true,retain:false" \
            -e ARROW_DEFAULT_MEMORY_POOL=jemalloc \
            -e JE_ARROW_MALLOC_CONF=oversize_threshold:8388608 \
            -e MIMALLOC_PURGE_DELAY=0 \
            -e MIMALLOC_PAGE_RESET=1 \
            mem-test python3 scripts/test_two_tier.py 2>&1 | tee results/output.txt

      - uses: actions/upload-artifact@v4
        with:
          name: schema-test-results
          path: results/
