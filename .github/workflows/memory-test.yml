name: Memory Creep Test

on:
  push:
  workflow_dispatch:

jobs:
  test-retain-true:
    runs-on: ubuntu-latest
    name: "retain:true (default)"
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mem-test .

      - name: Run test (retain:true)
        run: |
          docker run --rm \
            --memory 1200m --memory-swap 1200m \
            -v $PWD/results-true:/app/results \
            -e MALLOC_CONF="" \
            -e TEST_TTL=30 \
            -e TEST_MAX_ENTRIES=6 \
            -e TEST_NUM_PARAMS=4 \
            -e TEST_CYCLES=4 \
            -e TEST_DATA_MB=25 \
            -e TEST_USE_PYARROW=1 \
            mem-test python3 scripts/test_headless.py 2>&1 | tee results-true/output.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-retain-true
          path: results-true/

  test-retain-false:
    runs-on: ubuntu-latest
    name: "retain:false (fix)"
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mem-test .

      - name: Run test (retain:false)
        run: |
          docker run --rm \
            --memory 1200m --memory-swap 1200m \
            -v $PWD/results-false:/app/results \
            -e MALLOC_CONF="narenas:1,tcache:false,dirty_decay_ms:5000,muzzy_decay_ms:5000,background_thread:true,retain:false" \
            -e TEST_TTL=30 \
            -e TEST_MAX_ENTRIES=6 \
            -e TEST_NUM_PARAMS=4 \
            -e TEST_CYCLES=4 \
            -e TEST_DATA_MB=25 \
            -e TEST_USE_PYARROW=1 \
            mem-test python3 scripts/test_headless.py 2>&1 | tee results-false/output.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-retain-false
          path: results-false/

  summary:
    needs: [test-retain-true, test-retain-false]
    runs-on: ubuntu-latest
    name: "Compare results"
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: results-retain-true
          path: results-true
      - uses: actions/download-artifact@v4
        with:
          name: results-retain-false
          path: results-false

      - name: Print comparison
        run: |
          echo "=============================================="
          echo "  MEMORY CREEP TEST — COMPARISON SUMMARY"
          echo "=============================================="
          echo ""
          echo "--- retain:true (default) ---"
          cat results-true/output.txt
          echo ""
          echo "--- retain:false (fix) ---"
          cat results-false/output.txt
          echo ""
          echo "--- Drift comparison ---"
          echo "retain:true  drift: $(grep 'Final drift' results-true/output.txt || echo 'N/A')"
          echo "retain:false drift: $(grep 'Final drift' results-false/output.txt || echo 'N/A')"
