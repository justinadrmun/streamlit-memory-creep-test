name: Memory Creep Test

on:
  push:
  workflow_dispatch:

jobs:
  test-baseline:
    runs-on: ubuntu-latest
    name: "1. Baseline (old config)"
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t mem-test .
      - name: Run test
        run: |
          mkdir -p results-baseline
          docker run --rm \
            --memory 1200m --memory-swap 1200m \
            -v $PWD/results-baseline:/app/results \
            -e MALLOC_CONF="" \
            -e PYTHONMALLOC="" \
            -e MIMALLOC_PURGE_DELAY="25000" \
            -e TEST_TTL=30 \
            -e TEST_MAX_ENTRIES=6 \
            -e TEST_NUM_PARAMS=4 \
            -e TEST_CYCLES=4 \
            -e TEST_DATA_MB=25 \
            -e TEST_USE_PYARROW=1 \
            mem-test python3 scripts/test_headless.py 2>&1 | tee results-baseline/output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: results-baseline
          path: results-baseline/

  test-optimized:
    runs-on: ubuntu-latest
    name: "2. Optimized (PYTHONMALLOC=malloc + retain:false + malloc_trim)"
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t mem-test .
      - name: Run test
        run: |
          mkdir -p results-optimized
          docker run --rm \
            --memory 1200m --memory-swap 1200m \
            -v $PWD/results-optimized:/app/results \
            -e PYTHONMALLOC=malloc \
            -e MALLOC_CONF="narenas:1,tcache:false,dirty_decay_ms:1000,muzzy_decay_ms:1000,background_thread:true,retain:false" \
            -e MALLOC_ARENA_MAX=2 \
            -e MALLOC_TRIM_THRESHOLD_=131072 \
            -e MALLOC_MMAP_THRESHOLD_=131072 \
            -e ARROW_DEFAULT_MEMORY_POOL=jemalloc \
            -e JE_ARROW_MALLOC_CONF=oversize_threshold:8388608 \
            -e MIMALLOC_PURGE_DELAY=0 \
            -e MIMALLOC_PAGE_RESET=1 \
            -e TEST_TTL=30 \
            -e TEST_MAX_ENTRIES=6 \
            -e TEST_NUM_PARAMS=4 \
            -e TEST_CYCLES=4 \
            -e TEST_DATA_MB=25 \
            -e TEST_USE_PYARROW=1 \
            mem-test python3 scripts/test_headless.py 2>&1 | tee results-optimized/output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: results-optimized
          path: results-optimized/

  test-optimized-nocopy:
    runs-on: ubuntu-latest
    name: "3. Optimized + no PyArrow zero-copy"
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t mem-test .
      - name: Run test
        run: |
          mkdir -p results-nocopy
          docker run --rm \
            --memory 1200m --memory-swap 1200m \
            -v $PWD/results-nocopy:/app/results \
            -e PYTHONMALLOC=malloc \
            -e MALLOC_CONF="narenas:1,tcache:false,dirty_decay_ms:1000,muzzy_decay_ms:1000,background_thread:true,retain:false" \
            -e MALLOC_ARENA_MAX=2 \
            -e MALLOC_TRIM_THRESHOLD_=131072 \
            -e MALLOC_MMAP_THRESHOLD_=131072 \
            -e ARROW_DEFAULT_MEMORY_POOL=jemalloc \
            -e JE_ARROW_MALLOC_CONF=oversize_threshold:8388608 \
            -e MIMALLOC_PURGE_DELAY=0 \
            -e MIMALLOC_PAGE_RESET=1 \
            -e TEST_TTL=30 \
            -e TEST_MAX_ENTRIES=6 \
            -e TEST_NUM_PARAMS=4 \
            -e TEST_CYCLES=4 \
            -e TEST_DATA_MB=25 \
            -e TEST_USE_PYARROW=0 \
            mem-test python3 scripts/test_headless.py 2>&1 | tee results-nocopy/output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: results-nocopy
          path: results-nocopy/

  summary:
    needs: [test-baseline, test-optimized, test-optimized-nocopy]
    runs-on: ubuntu-latest
    name: "Compare all variants"
    steps:
      - uses: actions/download-artifact@v4
        with: { name: results-baseline, path: results-baseline }
      - uses: actions/download-artifact@v4
        with: { name: results-optimized, path: results-optimized }
      - uses: actions/download-artifact@v4
        with: { name: results-nocopy, path: results-nocopy }
      - name: Print comparison
        run: |
          echo "=============================================="
          echo "  MEMORY CREEP TEST — COMPARISON SUMMARY"
          echo "=============================================="
          echo ""
          for variant in baseline optimized nocopy; do
            echo "--- $variant ---"
            cat results-$variant/output.txt
            echo ""
          done
          echo "--- Drift comparison ---"
          for variant in baseline optimized nocopy; do
            echo "$variant: $(grep 'Final drift' results-$variant/output.txt || echo 'N/A')"
          done
